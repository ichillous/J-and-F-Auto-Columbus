<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="J&amp;F Auto monogram">
  <style>
    .bg     { fill: #05070a; }
    .border { fill: none; stroke: #f5f5f0; stroke-width: 2; }
    .brand  { font-family: 'Barlow Condensed', 'Oswald', 'Arial Narrow', sans-serif; fill: #f5f5f0; }
    .mark   { font-weight: 700; font-size: 110px; letter-spacing: 4px; text-anchor: middle; }
    .amp    { font-weight: 300; font-style: italic; font-size: 60px; text-anchor: middle; }
    .tag    { font-weight: 500; font-size: 14px; letter-spacing: 10px; text-anchor: middle; }
  </style>
  <rect class="bg" width="256" height="256" rx="20"/>
  <rect class="border" x="14" y="14" width="228" height="228" rx="12"/>
  <text x="128" y="138" class="brand mark">JF</text>
  <text x="128" y="62"  class="brand amp">&amp;</text>
  <line x1="56" y1="170" x2="200" y2="170" stroke="#f5f5f0" stroke-width="1" opacity="0.6"/>
  <text x="128" y="200" class="brand tag">AUTO</text>
</svg>
